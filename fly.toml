# fly.toml app configuration file generated for reflex-card-game on 2026-04-06T19:43:25+06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'reflex-card-game'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  ALLOWED_ORIGIN = 'https://reflex-card-game.fly.dev'
  PORT = '8080'
  STATIC_DIR = '/public'
  DB_PATH = '/data/ace_reaction.db'
  TRIGGER_RANK = 'A'
  ROUNDS_TO_WIN = '3'

[mounts]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
