services:
  - type: web
    name: reflex-card-game
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: "8080"
      - key: STATIC_DIR
        value: "/public"
      - key: ALLOWED_ORIGIN
        value: "https://reflex-card-game.onrender.com"
      - key: DB_PATH
        value: "/tmp/data/ace_reaction.db"
    plan: free
    healthCheckPath: /health
